robot:
  name: pi_plus
  asset_file: assets/pi_plus/pi_plus.xml
  base_link_name: base_link
  foot_link_names:
    - l_ankle_roll_link
    - r_ankle_roll_link
  foot_contact_points:
    # Local points on the front half of each foot link, used for early contact reward.
    # TODO: replace/tune with Genesis collision contact pairs after validating the API.
    l_ankle_roll_link:
      - [0.02, -0.03, -0.02]
      - [0.02, 0.0, -0.02]
      - [0.02, 0.03, -0.02]
      - [0.06, -0.03, -0.02]
      - [0.06, 0.0, -0.02]
      - [0.06, 0.03, -0.02]
      - [0.10, -0.025, -0.02]
      - [0.10, 0.0, -0.02]
      - [0.10, 0.025, -0.02]
    r_ankle_roll_link:
      - [0.02, -0.03, -0.02]
      - [0.02, 0.0, -0.02]
      - [0.02, 0.03, -0.02]
      - [0.06, -0.03, -0.02]
      - [0.06, 0.0, -0.02]
      - [0.06, 0.03, -0.02]
      - [0.10, -0.025, -0.02]
      - [0.10, 0.0, -0.02]
      - [0.10, 0.025, -0.02]
  joint_names:
    - l_hip_pitch_joint
    - l_hip_roll_joint
    - l_thigh_joint
    - l_calf_joint
    - l_ankle_pitch_joint
    - l_ankle_roll_joint
    - l_shoulder_pitch_joint
    - l_shoulder_roll_joint
    - l_upper_arm_joint
    - l_elbow_joint
    - r_hip_pitch_joint
    - r_hip_roll_joint
    - r_thigh_joint
    - r_calf_joint
    - r_ankle_pitch_joint
    - r_ankle_roll_joint
    - r_shoulder_pitch_joint
    - r_shoulder_roll_joint
    - r_upper_arm_joint
    - r_elbow_joint
  default_joint_pos:
    l_hip_pitch_joint: -0.25
    l_hip_roll_joint: 0.0
    l_thigh_joint: 0.0
    l_calf_joint: 0.65
    l_ankle_pitch_joint: -0.4
    l_ankle_roll_joint: 0.0
    l_shoulder_pitch_joint: 0.0
    l_shoulder_roll_joint: 0.2
    l_upper_arm_joint: 0.0
    l_elbow_joint: -1.2
    r_hip_pitch_joint: -0.25
    r_hip_roll_joint: 0.0
    r_thigh_joint: 0.0
    r_calf_joint: 0.65
    r_ankle_pitch_joint: -0.4
    r_ankle_roll_joint: 0.0
    r_shoulder_pitch_joint: 0.0
    r_shoulder_roll_joint: -0.2
    r_upper_arm_joint: 0.0
    r_elbow_joint: -1.2
  joint_limits: {}  # TODO: parse/verify limits from asset in Genesis joint order.
  pd_kp:
    l_hip_pitch_joint: 80
    l_hip_roll_joint: 80
    l_thigh_joint: 80
    l_calf_joint: 80
    l_ankle_pitch_joint: 60
    l_ankle_roll_joint: 60
    l_shoulder_pitch_joint: 30
    l_shoulder_roll_joint: 30
    l_upper_arm_joint: 30
    l_elbow_joint: 30
    r_hip_pitch_joint: 80
    r_hip_roll_joint: 80
    r_thigh_joint: 80
    r_calf_joint: 80
    r_ankle_pitch_joint: 60
    r_ankle_roll_joint: 60
    r_shoulder_pitch_joint: 30
    r_shoulder_roll_joint: 30
    r_upper_arm_joint: 30
    r_elbow_joint: 30
  pd_kd:
    l_hip_pitch_joint: 1.1
    l_hip_roll_joint: 1.1
    l_thigh_joint: 1.1
    l_calf_joint: 1.1
    l_ankle_pitch_joint: 1.2
    l_ankle_roll_joint: 1.2
    l_shoulder_pitch_joint: 0.6
    l_shoulder_roll_joint: 0.6
    l_upper_arm_joint: 0.6
    l_elbow_joint: 0.6
    r_hip_pitch_joint: 1.1
    r_hip_roll_joint: 1.1
    r_thigh_joint: 1.1
    r_calf_joint: 1.1
    r_ankle_pitch_joint: 1.2
    r_ankle_roll_joint: 1.2
    r_shoulder_pitch_joint: 0.6
    r_shoulder_roll_joint: 0.6
    r_upper_arm_joint: 0.6
    r_elbow_joint: 0.6
  action_scale:
    default: 0.25
sim:
  backend: cuda
  headless: true
  sim_dt: 0.002
  control_dt: 0.02
scene:
  ground: true
  ground_plane_size: [12.0, 8.0]
  ground_tile_size: [0.25, 0.25]
  ground_color: [0.10, 0.45, 0.16, 1.0]
  ground_friction: 1.3
  field_style: soccer
  field_texture_resolution: [1024, 768]
  field_stripe_count: 10
  field_line_color: [0.93, 0.95, 0.90, 1.0]
  field_line_width_m: 0.045
  field_visual_z: -0.006
  viewer_camera_pos: [2.2, -2.2, 1.4]
  viewer_camera_lookat: [0.15, 0.0, 0.35]
  viewer_camera_fov: 45
ball:
  radius: 0.065
  mass: 0.15
  initial_pos: [0.20, -0.05, 0.065]
  # Genesis Rigid exposes contact friction here. True rolling resistance is not
  # separately modeled yet, so tune this together with ball-speed rewards.
  friction: 1.6
  # Empirical damping used by PiPlusKickEnv to approximate rolling energy loss.
  # Units are 1/s; 0 disables it. Tune against a real roll-distance test later.
  rolling_linear_damping_per_s: 2.5
  rolling_angular_damping_per_s: 1.5
  color: [0.96, 0.94, 0.86, 1.0]
test:
  stand_seconds: 5.0
  max_roll_pitch_rad: 0.7
