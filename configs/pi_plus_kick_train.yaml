seed: 42
device: cuda
num_envs: 1024
env_spacing: [2.0, 2.0]
episode_length_s: 2.5
baseline:
  mode: locomotion_policy
  policy_path: policies/model_40000.pt
  policy_device: auto
  action_scale: 0.25
  command: [0.0, 0.0, 0.0]
control:
  action_dim: 20
  action_scale_default: 0.0
  leg_action_scale: 0.0
  arm_action_scale: 0.0
  joint_action_scale:
    l_hip_pitch_joint: 0.015
    l_hip_roll_joint: 0.015
    l_thigh_joint: 0.0
    l_calf_joint: 0.015
    l_ankle_pitch_joint: 0.015
    l_ankle_roll_joint: 0.015
    l_shoulder_pitch_joint: 0.0
    l_shoulder_roll_joint: 0.0
    l_upper_arm_joint: 0.0
    l_elbow_joint: 0.0
    r_hip_pitch_joint: 0.035
    r_hip_roll_joint: 0.025
    r_thigh_joint: 0.02
    r_calf_joint: 0.035
    r_ankle_pitch_joint: 0.03
    r_ankle_roll_joint: 0.02
    r_shoulder_pitch_joint: 0.0
    r_shoulder_roll_joint: 0.0
    r_upper_arm_joint: 0.0
    r_elbow_joint: 0.0
  max_delta_rad: 0.05
  max_delta_rate_rad_per_s: 0.8
  max_joint_velocity_rad_per_s: 8.0
  max_torque_leg: 20.0
  max_torque_arm: 10.0
task:
  ball_initial_pos: [0.21, -0.06, 0.065]
  ball_pos_range:
    x: [0.19, 0.27]
    y: [-0.09, -0.02]
  target_mode: vector
  target_pos_robot: [1.8, 0.0]
  target_distance_range: [1.0, 3.0]
  target_angle_range_rad: [-0.8, 0.8]
  desired_ball_speed: 1.8
  desired_ball_speed_range: [0.8, 3.0]
  kickable_x_range: [0.08, 0.35]
  kickable_y_abs_max: 0.18
safety:
  max_roll_pitch_rad: 0.75
  action_max_roll_pitch_rad: 0.25
  min_base_height: 0.20
  action_min_base_height: 0.32
  max_base_height: 0.65
  emergency_stop_file: null
rsl_rl:
  runner_class_name: OnPolicyRunner
  logger: tensorboard
  num_steps_per_env: 24
  max_iterations: 20000
  save_interval: 500
  empirical_normalization: false
  policy:
    class_name: ActorCritic
    init_noise_std: 0.05
    noise_std_type: scalar
    actor_hidden_dims: [256, 256, 128]
    critic_hidden_dims: [256, 256, 128]
    activation: elu
  algorithm:
    class_name: PPO
    value_loss_coef: 1.0
    use_clipped_value_loss: true
    clip_param: 0.2
    entropy_coef: 0.0
    num_learning_epochs: 5
    num_mini_batches: 4
    learning_rate: 0.00003
    schedule: adaptive
    gamma: 0.99
    lam: 0.95
    desired_kl: 0.003
    max_grad_norm: 1.0
    normalize_advantage_per_mini_batch: false
    rnd_cfg: null
    symmetry_cfg: null
