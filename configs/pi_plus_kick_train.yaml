seed: 42
device: cuda
num_envs: 1024
env_spacing: [2.0, 2.0]
episode_length_s: 2.5
baseline:
  mode: locomotion_policy
  policy_path: policies/model_40000.pt
  policy_device: auto
  action_scale: 0.25
  command: [0.0, 0.0, 0.0]
control:
  action_dim: 20
  action_scale_default: 0.18
  leg_action_scale: 0.22
  arm_action_scale: 0.06
  max_delta_rad: 0.35
  max_delta_rate_rad_per_s: 7.0
  max_joint_velocity_rad_per_s: 18.0
  max_torque_leg: 20.0
  max_torque_arm: 10.0
task:
  ball_initial_pos: [0.18, -0.05, 0.05]
  ball_pos_range:
    x: [0.12, 0.28]
    y: [-0.12, 0.12]
  target_mode: vector
  target_pos_robot: [1.8, 0.0]
  target_distance_range: [1.0, 3.0]
  target_angle_range_rad: [-0.8, 0.8]
  desired_ball_speed: 1.8
  desired_ball_speed_range: [0.8, 3.0]
  kickable_x_range: [0.08, 0.35]
  kickable_y_abs_max: 0.18
safety:
  max_roll_pitch_rad: 0.75
  min_base_height: 0.20
  max_base_height: 0.65
  emergency_stop_file: null
rsl_rl:
  runner_class_name: OnPolicyRunner
  logger: tensorboard
  num_steps_per_env: 24
  max_iterations: 20000
  save_interval: 500
  empirical_normalization: false
  policy:
    class_name: ActorCritic
    init_noise_std: 0.6
    noise_std_type: scalar
    actor_hidden_dims: [256, 256, 128]
    critic_hidden_dims: [256, 256, 128]
    activation: elu
  algorithm:
    class_name: PPO
    value_loss_coef: 1.0
    use_clipped_value_loss: true
    clip_param: 0.2
    entropy_coef: 0.002
    num_learning_epochs: 5
    num_mini_batches: 4
    learning_rate: 0.0005
    schedule: adaptive
    gamma: 0.99
    lam: 0.95
    desired_kl: 0.01
    max_grad_norm: 1.0
    normalize_advantage_per_mini_batch: false
    rnd_cfg: null
    symmetry_cfg: null
